<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Showcase</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#111;
    color:white;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    height:80vh;
    background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.hero h1{
    font-size:55px;
}

.hero p{
    margin:15px 0;
    font-size:20px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:#ff3c00;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

.cars{
    padding:50px;
}

.card-container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
    <h2>CarZone</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Cars</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <div>
        <h1>Luxury Cars</h1>
        <p>Drive Your Dream Car Today</p>
        <a href="#" class="btn">Explore Cars</a>
    </div>
</section>

<section class="cars">
    <h2 style="text-align:center;margin-bottom:30px;">Featured Cars</h2>

    <div class="card-container">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?auto=format&fit=crop&w=600&q=80">
            <div class="card-content">
                <h3>BMW M4</h3>
                <p>Powerful sports coupe with premium design.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/p
